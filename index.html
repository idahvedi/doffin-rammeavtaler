<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doffin – IT-rammeavtaler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    #status {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 16px;
    }

    #filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      user-select: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .chip.active {
      background: #1a56db;
      border-color: #1a56db;
      color: #fff;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 16px 20px;
      border: 1px solid #e0e0e0;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-title a {
      color: #1a56db;
      text-decoration: none;
    }

    .card-title a:hover {
      text-decoration: underline;
    }

    .card-meta {
      font-size: 0.82rem;
      color: #555;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: #e8f0fe;
      color: #1a56db;
      margin-bottom: 6px;
    }

    .deadline-soon {
      color: #c0392b;
      font-weight: 600;
    }

    #no-results {
      color: #666;
      font-size: 0.95rem;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Doffin – IT-rammeavtaler</h1>
  <div id="status">Henter utlysninger…</div>
  <div id="filters"></div>
  <div id="no-results">Ingen utlysninger matcher valgt sted.</div>
  <div id="results"></div>

  <script>
    const API_URL = "https://api.doffin.no/webclient/api/v2/search-api/search";
    const DOFFIN_BASE = "https://doffin.no/notice";

    const DEFAULT_LOCATIONS = ["Oslo", "Akershus"];

    const TYPE_LABELS = {
      COMPETITION: "Konkurranse",
      ANNOUNCEMENT_OF_COMPETITION: "Kunngjøring av konkurranse",
      DYNAMIC_PURCHASING_SCHEME: "Dynamisk innkjøpsordning",
      PRE_ANNOUNCEMENT: "Forhåndskunngjøring",
    };

    let allNotices = [];
    let activeFilters = new Set(DEFAULT_LOCATIONS);

    async function fetchNotices() {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          facets: {
            cpvCodesId: { checkedItems: ["72000000", "72200000", "72300000", "72400000", "72600000"] },
            type: { checkedItems: ["COMPETITION", "ANNOUNCEMENT_OF_COMPETITION", "DYNAMIC_PURCHASING_SCHEME", "PRE_ANNOUNCEMENT"] },
            status: { checkedItems: ["ACTIVE"] },
          },
          numHitsPerPage: 1000,
        }),
      });

      const data = await response.json();
      return data.hits || [];
    }

    function getLocations(notices) {
      const all = new Set();
      for (const n of notices) {
        if (n.placeOfPerformance && n.placeOfPerformance.length > 0) {
          for (const place of n.placeOfPerformance) {
            all.add(place);
          }
        } else {
          all.add("Ikke oppgitt");
        }
      }
      return Array.from(all).sort((a, b) => {
        if (a === "Ikke oppgitt") return 1;
        if (b === "Ikke oppgitt") return -1;
        return a.localeCompare(b, "no");
      });
    }

    function renderFilters(locations) {
      const container = document.getElementById("filters");
      container.innerHTML = "";

      for (const loc of locations) {
        const chip = document.createElement("button");
        chip.className = "chip" + (activeFilters.has(loc) ? " active" : "");
        chip.textContent = loc;
        chip.addEventListener("click", () => {
          if (activeFilters.has(loc)) {
            activeFilters.delete(loc);
          } else {
            activeFilters.add(loc);
          }
          renderFilters(locations);
          renderResults();
        });
        container.appendChild(chip);
      }
    }

    function formatDate(iso) {
      if (!iso) return "–";
      return new Date(iso).toLocaleDateString("no-NO", { day: "2-digit", month: "2-digit", year: "numeric" });
    }

    function daysUntil(iso) {
      if (!iso) return null;
      const diff = new Date(iso) - new Date();
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    function renderResults() {
      const container = document.getElementById("results");
      const noResults = document.getElementById("no-results");
      container.innerHTML = "";

      const filtered = allNotices.filter((n) => {
        if (activeFilters.size === 0) return true;
        if (!n.placeOfPerformance || n.placeOfPerformance.length === 0) {
          return activeFilters.has("Ikke oppgitt");
        }
        return n.placeOfPerformance.some((p) => activeFilters.has(p));
      });

      noResults.style.display = filtered.length === 0 ? "block" : "none";

      for (const n of filtered) {
        const card = document.createElement("div");
        card.className = "card";

        const typeLabel = TYPE_LABELS[n.type] || n.type || "";
        const buyer = n.buyer?.[0]?.name || "Ukjent oppdragsgiver";
        const deadline = n.deadline;
        const days = daysUntil(deadline);
        const deadlineText = deadline
          ? `Frist: ${formatDate(deadline)}${days !== null && days <= 14 ? ` (${days} dager)` : ""}`
          : "Ingen frist oppgitt";
        const deadlineSoon = days !== null && days <= 14;
        const places = n.placeOfPerformance?.join(", ") || "Ikke oppgitt";
        const link = `${DOFFIN_BASE}/${n.id}`;

        card.innerHTML = `
          <div class="badge">${typeLabel}</div>
          <div class="card-title"><a href="${link}" target="_blank">${n.heading || "Uten tittel"}</a></div>
          <div class="card-meta">
            <span>🏢 ${buyer}</span>
            <span>📍 ${places}</span>
            <span class="${deadlineSoon ? "deadline-soon" : ""}">${deadlineSoon ? "⚠️ " : ""}${deadlineText}</span>
          </div>
        `;

        container.appendChild(card);
      }

      document.getElementById("status").textContent =
        `Viser ${filtered.length} av ${allNotices.length} aktive utlysninger`;
    }

    async function init() {
      try {
        allNotices = await fetchNotices();
        const locations = getLocations(allNotices);

        // Sett default-filtre til de som faktisk finnes i dataen
        activeFilters = new Set(DEFAULT_LOCATIONS.filter((l) => locations.includes(l)));

        renderFilters(locations);
        renderResults();
      } catch (err) {
        document.getElementById("status").textContent = "Kunne ikke hente data fra Doffin.";
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
